name: Playwright Tests

on: [push, pull_request]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest

      - name: Install Playwright Browsers
        run: python -m playwright install --with-deps

      - name: Run Playwright tests
        # We add --alluredir to catch the raw data
        run: pytest tests/ -v --alluredir=allure-results
        continue-on-error: true

      - name: Build Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      # Only ensure folder exists IF Allure fails
      - name: Ensure report exists (fallback)
        if: always()
        run: |
          if [ ! -d "allure-history" ] || [ -z "$(ls -A allure-history 2>/dev/null)" ]; then
            echo "Allure report missing, creating fallback..."
            mkdir -p allure-history
            echo "<h1>Report not generated</h1>" > allure-history/index.html
          fi

      - name: Debug files
        if: always()
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== ALLURE RESULTS ==="
          ls -la allure-results || true
          echo "=== ALLURE HISTORY ==="
          ls -la allure-history || true

      - name: Deploy Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true